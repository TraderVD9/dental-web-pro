<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Skills Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#111827;--card:#1a2035;--brd:rgba(56,139,255,0.1);--ac:#3B8EFF;--ac2:#22D3A7;--ac3:#F59E0B;--ac4:#EF4444;--ac5:#A855F7;--tx:#e8edf5;--tx2:#7b8ba5;--mt:#4a5568}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:20px}

.header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;margin-bottom:24px;border-bottom:1px solid var(--brd)}
.header h1{font-size:1.4rem;font-weight:700;display:flex;align-items:center;gap:10px}
.header h1 span{background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-stats{display:flex;gap:24px}
.h-stat{text-align:center}
.h-stat .num{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--ac)}
.h-stat .lbl{font-size:.65rem;color:var(--mt);text-transform:uppercase;letter-spacing:.1em}

.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg2);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:8px 20px;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .3s;border:none;background:none;font-family:'Outfit',sans-serif}
.tab.active{background:var(--card);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tab:hover{color:var(--tx)}

.content{display:none}
.content.active{display:block}

/* ═══ SKILLS TAB ═══ */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.skill-group{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:20px;transition:all .3s}
.skill-group:hover{border-color:rgba(56,139,255,.2)}
.sg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sg-title{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:8px}
.sg-title .icon{font-size:1.1rem}
.sg-count{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--mt);background:var(--bg);padding:2px 8px;border-radius:6px}
.sg-progress{width:100%;height:4px;background:var(--bg);border-radius:4px;margin-bottom:14px;overflow:hidden}
.sg-fill{height:100%;border-radius:4px;transition:width .6s ease}
.skill-list{display:flex;flex-direction:column;gap:6px}
.skill-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;font-size:.8rem;transition:background .2s;cursor:default}
.skill-item:hover{background:rgba(56,139,255,.04)}
.skill-name{color:var(--tx2);display:flex;align-items:center;gap:6px}
.skill-level{display:flex;gap:2px}
.skill-dot{width:8px;height:8px;border-radius:50%;background:var(--bg);border:1px solid var(--mt);transition:all .3s}
.skill-dot.filled{border-color:transparent}
.skill-dot.l1{background:var(--ac4)}
.skill-dot.l2{background:var(--ac3)}
.skill-dot.l3{background:var(--ac)}
.skill-dot.l4{background:var(--ac2)}
.skill-dot.l5{background:var(--ac2);box-shadow:0 0 6px rgba(34,211,167,.4)}

.legend{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--tx2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* ═══ CHAINS TAB ═══ */
.chain{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:24px;margin-bottom:16px}
.chain-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.chain-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.chain-status{font-size:.68rem;padding:3px 10px;border-radius:100px;font-weight:500}
.chain-status.active{background:rgba(34,211,167,.1);color:var(--ac2)}
.chain-status.draft{background:rgba(245,158,11,.1);color:var(--ac3)}
.chain-status.planned{background:rgba(107,114,128,.1);color:var(--mt)}
.chain-flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding:8px 0}
.chain-step{display:flex;flex-direction:column;align-items:center;min-width:100px;position:relative}
.step-box{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:.72rem;text-align:center;color:var(--tx2);transition:all .3s;cursor:default;width:100px}
.step-box:hover{border-color:var(--ac);color:var(--tx)}
.step-box .agent{font-size:.6rem;color:var(--mt);margin-top:3px;font-family:'JetBrains Mono',monospace}
.chain-arrow{color:var(--ac);font-size:.8rem;margin:0 4px;flex-shrink:0;opacity:.4}
.step-box.trigger{border-color:var(--ac2);background:rgba(34,211,167,.04)}
.step-box.action{border-color:var(--ac);background:rgba(59,142,255,.04)}
.step-box.output{border-color:var(--ac3);background:rgba(245,158,11,.04)}

/* ═══ GAPS TAB ═══ */
.gap-card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:20px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start}
.gap-priority{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.gap-priority.high{background:rgba(239,68,68,.1);color:var(--ac4)}
.gap-priority.med{background:rgba(245,158,11,.1);color:var(--ac3)}
.gap-priority.low{background:rgba(107,114,128,.1);color:var(--mt)}
.gap-content h3{font-size:.9rem;font-weight:600;margin-bottom:4px}
.gap-content p{font-size:.78rem;color:var(--tx2);line-height:1.5}
.gap-action{font-size:.7rem;color:var(--ac);margin-top:6px;font-weight:500}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .skills-grid{grid-template-columns:1fr}
  .header{flex-direction:column;gap:12px;text-align:center}
  .header-stats{justify-content:center}
  .chain-flow{flex-wrap:wrap;gap:8px}
  .chain-arrow{display:none}
}
</style>
</head>

// ═══ RENDER SKILLS ═══
function renderSkills() {
  const grid = document.getElementById('skillsGrid');
  let totalSkills = 0, totalLevel = 0, maxLevel = 0;
  
  skillsData.forEach(group => {
    const avgLevel = group.skills.reduce((s,sk) => s + sk.level, 0) / group.skills.length;
    const pct = Math.round(avgLevel / 5 * 100);
    totalSkills += group.skills.length;
    totalLevel += group.skills.reduce((s,sk) => s + sk.level, 0);
    maxLevel += group.skills.length * 5;
    
    let skillsHTML = group.skills.map(sk => {
      let dots = '';
      for(let i = 1; i <= 5; i++) {
        const cls = i <= sk.level ? `filled l${sk.level}` : '';
        dots += `<div class="skill-dot ${cls}"></div>`;
      }
      return `<div class="skill-item"><span class="skill-name">${sk.name}</span><div class="skill-level">${dots}</div></div>`;
    }).join('');
    
    grid.innerHTML += `
      <div class="skill-group">
        <div class="sg-header">
          <div class="sg-title"><span class="icon">${group.group.split(' ')[0]}</span>${group.group.split(' ').slice(1).join(' ')}</div>
          <div class="sg-count">${group.skills.length} skills · ${pct}%</div>
        </div>
        <div class="sg-progress"><div class="sg-fill" style="width:${pct}%;background:${group.color}"></div></div>
        <div class="skill-list">${skillsHTML}</div>
      </div>
    `;
  });
  
  document.getElementById('totalSkills').textContent = totalSkills;
  document.getElementById('avgLevel').textContent = Math.round(totalLevel/maxLevel*100) + '%';
}

// ═══ RENDER CHAINS ═══
function renderChains() {
  const container = document.getElementById('chainsContainer');
  let activeCount = 0;
  
  chainsData.forEach(chain => {
    if(chain.status === 'active') activeCount++;
    const stepsHTML = chain.steps.map((step, i) => {
      const arrow = i < chain.steps.length - 1 ? '<div class="chain-arrow">→</div>' : '';
      return `
        <div class="chain-step">
          <div class="step-box ${step.type}">
            ${step.text.replace('\n','<br>')}
            <div class="agent">${step.agent}</div>
          </div>
        </div>
        ${arrow}
      `;
    }).join('');
    
    container.innerHTML += `
      <div class="chain">
        <div class="chain-header">
          <div class="chain-title">${chain.name}</div>
          <div class="chain-status ${chain.status}">${chain.status === 'active' ? '✓ Active' : chain.status === 'draft' ? '◎ Draft' : '○ Planned'}</div>
        </div>
        <div class="chain-flow">${stepsHTML}</div>
      </div>
    `;
  });
  
  document.getElementById('activeChains').textContent = chainsData.length;
}

// ═══ RENDER GAPS ═══
function renderGaps() {
  const container = document.getElementById('gapsContainer');
  let gapCount = gapsData.filter(g => g.priority === 'high').length;
  
  gapsData.forEach(gap => {
    container.innerHTML += `
      <div class="gap-card">
        <div class="gap-priority ${gap.priority}">${gap.priority === 'high' ? '🔴' : gap.priority === 'med' ? '🟡' : '⬜'}</div>
        <div class="gap-content">
          <h3>${gap.title}</h3>
          <p>${gap.desc}</p>
          <div class="gap-action">${gap.action}</div>
        </div>
      </div>
    `;
  });
  
  document.getElementById('gapCount').textContent = gapCount;
}

// ═══ TAB SWITCHING ═══
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tabName).classList.add('active');
}

// ═══ INIT ═══
renderSkills();
renderChains();
renderGaps();
</script>
</body>
</html>
