<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — 87 Dental Websites | DentalWebAI</title>
<meta name="description" content="87 personalized dental website demos across 9 countries. See real examples of our work for dental practices worldwide.">
<link rel="canonical" href="https://dentalwebai.com/portfolio.html">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFBFE;--ac:#2563EB;--ac2:#0EA371;--tx:#0F1A2E;--tx2:#526280;--mt:#94A3B8;--brd:rgba(15,30,80,0.06);--shadow:0 4px 24px rgba(15,30,80,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx)}

nav{padding:16px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);position:sticky;top:0;background:rgba(250,251,254,0.95);backdrop-filter:blur(12px);z-index:10}
nav a{text-decoration:none;color:var(--tx);font-weight:600;font-size:.95rem}
nav .back{color:var(--ac);font-size:.85rem}

.hero{text-align:center;padding:60px 40px 40px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:12px}
.hero p{color:var(--tx2);font-size:1rem;max-width:500px;margin:0 auto 28px}

.filters{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;padding:0 20px}
.f{padding:6px 16px;border-radius:100px;font-size:.75rem;cursor:pointer;border:1px solid var(--brd);background:#fff;color:var(--tx2);transition:.2s}
.f.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.f:hover{border-color:var(--ac)}
.count{font-family:'JetBrains Mono',monospace;font-size:.65rem;margin-left:4px;opacity:.6}

.search{display:block;margin:0 auto 32px;padding:12px 20px;border:1px solid var(--brd);border-radius:100px;width:min(400px,90vw);font-size:.88rem;font-family:'Outfit',sans-serif;outline:none;background:#fff}
.search:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,0.06)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:0 40px 60px;max-width:1400px;margin:0 auto}

.card{background:#fff;border:1px solid var(--brd);border-radius:12px;overflow:hidden;transition:all .3s;text-decoration:none;color:var(--tx);display:block}
.card:hover{border-color:rgba(37,99,235,0.15);box-shadow:var(--shadow);transform:translateY(-4px)}
.card-top{height:140px;background:linear-gradient(135deg,rgba(37,99,235,0.04),rgba(14,163,113,0.03));display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;overflow:hidden}
.card-top::after{content:'VIEW →';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(37,99,235,0.04);backdrop-filter:blur(2px);font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--ac);letter-spacing:.1em;opacity:0;transition:.3s}
.card:hover .card-top::after{opacity:1}
.card-body{padding:14px 16px}
.card-body h3{font-size:.88rem;font-weight:600;margin-bottom:4px}
.card-body p{font-size:.75rem;color:var(--tx2)}
.card-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:.6rem;padding:2px 8px;background:rgba(37,99,235,0.04);color:var(--ac);border-radius:100px;font-family:'JetBrains Mono',monospace;border:1px solid rgba(37,99,235,0.06)}
.tag.country{background:rgba(14,163,113,0.04);color:var(--ac2);border-color:rgba(14,163,113,0.06)}

footer{text-align:center;padding:32px;border-top:1px solid var(--brd);font-size:.78rem;color:var(--mt)}
footer a{color:var(--ac);text-decoration:none}

@media(max-width:600px){.grid{padding:0 14px 40px;grid-template-columns:1fr}nav{padding:12px 18px}.hero{padding:40px 18px 24px}}
</style>
</head>
<body>

const countries = [...new Set(projects.map(p=>p.country))].sort();
const tiers = {premium:'Premium',professional:'Professional',starter:'Starter',client:'Client Work',analysis:'Competitor Analysis'};

// Render filters
const filtersEl = document.getElementById('filters');
filtersEl.innerHTML = '<div class="f active" data-f="all">All<span class="count">'+projects.length+'</span></div>' +
  Object.entries(tiers).map(([k,v])=>'<div class="f" data-f="tier:'+k+'">'+v+'<span class="count">'+projects.filter(p=>p.tier===k).length+'</span></div>').join('') +
  countries.map(c=>'<div class="f" data-f="country:'+c+'">'+({US:'🇺🇸',UK:'🇬🇧',AU:'🇦🇺',CA:'🇨🇦',IE:'🇮🇪',DE:'🇩🇪',NL:'🇳🇱',AT:'🇦🇹',BE:'🇧🇪'}[c]||c)+'<span class="count">'+projects.filter(p=>p.country===c).length+'</span></div>').join('');

let currentFilter = 'all';

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  let filtered = projects.filter(p => {
    if (currentFilter !== 'all') {
      if (currentFilter.startsWith('tier:') && p.tier !== currentFilter.split(':')[1]) return false;
      if (currentFilter.startsWith('country:') && p.country !== currentFilter.split(':')[1]) return false;
    }
    if (search && !`${p.name} ${p.city} ${p.country} ${p.tags.join(' ')}`.toLowerCase().includes(search)) return false;
    return true;
  });

  grid.innerHTML = filtered.map(p => {
    const href = p.external ? p.slug : 'demos/' + p.slug + '.html';
    return `<a href="${href}" class="card" target="_blank" rel="noopener noreferrer">
      <div class="card-top">${p.icon}</div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <p>${p.city}</p>
        <div class="card-meta">
          ${p.tags.map(t=>'<span class="tag">'+t+'</span>').join('')}
          <span class="tag country">${p.country}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

document.querySelectorAll('.f').forEach(f => {
  f.addEventListener('click', () => {
    document.querySelectorAll('.f').forEach(x=>x.classList.remove('active'));
    f.classList.add('active');
    currentFilter = f.dataset.f;
    render();
  });
});

document.getElementById('search').addEventListener('input', render);
render();
</script>
